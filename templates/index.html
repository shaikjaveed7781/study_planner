<!DOCTYPE html>
<html>
<head>
    <title>Smart Study Planner</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>Smart Study Planner</h1>

    <!-- Task Form -->
    <form action="/add" method="POST">
        <input type="text" name="task" placeholder="Enter study task" required>

        <select name="priority">
            <option value="High">High</option>
            <option value="Medium">Medium</option>
            <option value="Low">Low</option>
        </select>

        <button type="submit">Add</button>
    </form>

    <!-- Task List -->
    <h2>Tasks</h2>

    <ul>
        {% for task in tasks %}
        <li>
            <span class="task-text">
                {{ task[1] }} ({{ task[2] }}) - {{ task[3] }}
            </span>

            <div>
                <a href="/complete/{{ task[0] }}" class="complete-btn">Complete</a>
                <a href="/delete/{{ task[0] }}" class="delete-btn">Delete</a>
            </div>
        </li>
        {% endfor %}
    </ul>

    <!-- Timer Section -->
    <h2>Study Timer</h2>

    <label>Set Timer (minutes):</label>
    <input type="number" id="customTime" placeholder="Enter minutes" min="1">

    <div id="timer">25:00</div>

    <div class="timer-buttons">
        <button onclick="startTimer()">Start</button>
        <button onclick="resetTimer()">Reset</button>
    </div>

</div>

<!-- JS -->
<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
